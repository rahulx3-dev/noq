name: qcutapp
description: "Smart canteen app with role-based access for students, staff, and admins."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.4

  # Charts
  fl_chart: ^0.70.2

  # Image picker
  image_picker: ^1.1.2

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Typography
  google_fonts: ^6.2.1
  intl: ^0.20.2
  uuid: ^4.5.3
  flutter_tts: ^4.2.5
  rxdart: ^0.28.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.2.0
  http: ^1.6.0
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21 

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
