<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Change Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#F28B62",
                        "primary-dark": "#D97A54",
                        "background-light": "#FDFDFD",
                        "background-dark": "#1F1D2B",
                        "surface-light": "#FFFFFF",
                        "surface-dark": "#2D2B39",
                        "text-main-light": "#2D2B39",
                        "text-main-dark": "#FDFDFD",
                        "text-secondary-light": "#9CA3AF",
                        "text-secondary-dark": "#9CA3AF",
                    },
                    fontFamily: {
                        display: ["'DM Serif Display'", "serif"],
                        body: ["'DM Sans'", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        xl: "1.5rem",
                        '2xl': "2rem",
                    },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(0,0,0,0.08)',
                        'nav': '0 -4px 20px rgba(0,0,0,0.05)',
                    }
                },
            },
        };
    </script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&amp;family=DM+Serif+Display&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
        h1, h2, h3, h4 {
            font-family: 'DM Serif Display', serif;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-100 dark:bg-gray-900 flex justify-center items-center min-h-screen py-8">
<div class="w-full max-w-sm h-[812px] bg-background-light dark:bg-background-dark overflow-hidden relative shadow-2xl rounded-[3rem] border-[8px] border-gray-900 dark:border-gray-800 flex flex-col">
<div class="h-12 w-full flex justify-between items-center px-6 pt-2 z-20 relative shrink-0">
<span class="text-sm font-semibold text-text-main-light dark:text-text-main-dark">9:41</span>
<div class="flex space-x-2 text-text-main-light dark:text-text-main-dark">
<span class="material-icons-round text-sm">signal_cellular_alt</span>
<span class="material-icons-round text-sm">wifi</span>
<span class="material-icons-round text-sm">battery_full</span>
</div>
</div>
<div class="px-6 pb-6 pt-2 flex items-center gap-4 shrink-0">
<button class="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-surface-dark transition-colors text-text-main-light dark:text-text-main-dark">
<span class="material-icons-round">arrow_back</span>
</button>
<h1 class="text-2xl text-text-main-light dark:text-text-main-dark tracking-wide pt-1">Change Password</h1>
</div>
<div class="px-6 flex-1 overflow-y-auto no-scrollbar flex flex-col">
<div class="mt-4 mb-8 text-center">
<div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-primary/10 text-primary mb-4">
<span class="material-icons-round text-4xl">lock_reset</span>
</div>
<p class="text-text-secondary-light dark:text-text-secondary-dark text-sm px-4 leading-relaxed">
                    Please enter your current password to verify your identity, then create a new strong password.
                </p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="text-sm font-medium text-text-main-light dark:text-text-main-dark ml-1">Current Password</label>
<div class="relative">
<input class="w-full bg-surface-light dark:bg-surface-dark text-text-main-light dark:text-text-main-dark rounded-xl border-gray-200 dark:border-gray-700 py-3.5 pl-4 pr-12 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="Enter current password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors p-1" type="button">
<span class="material-icons-round text-xl">visibility_off</span>
</button>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-text-main-light dark:text-text-main-dark ml-1">New Password</label>
<div class="relative">
<input class="w-full bg-surface-light dark:bg-surface-dark text-text-main-light dark:text-text-main-dark rounded-xl border-gray-200 dark:border-gray-700 py-3.5 pl-4 pr-12 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="Enter new password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors p-1" type="button">
<span class="material-icons-round text-xl">visibility_off</span>
</button>
</div>
<p class="text-xs text-text-secondary-light dark:text-text-secondary-dark ml-1 flex items-center gap-1">
<span class="material-icons-round text-[14px]">info</span>
                        Must be at least 8 characters
                    </p>
</div>
<div class="space-y-2">
<label class="text-sm font-medium text-text-main-light dark:text-text-main-dark ml-1">Confirm New Password</label>
<div class="relative">
<input class="w-full bg-surface-light dark:bg-surface-dark text-text-main-light dark:text-text-main-dark rounded-xl border-gray-200 dark:border-gray-700 py-3.5 pl-4 pr-12 focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="Re-enter new password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary transition-colors p-1" type="button">
<span class="material-icons-round text-xl">visibility_off</span>
</button>
</div>
</div>
</form>
<div class="flex-1"></div> 
<div class="pt-8 pb-10">
<button class="w-full bg-primary hover:bg-primary-dark text-white font-medium py-4 px-4 rounded-2xl transition-colors shadow-lg shadow-primary/25 flex items-center justify-center gap-2 mb-4">
<span>Update Password</span>
</button>
<div class="text-center">
<a class="text-sm font-medium text-text-secondary-light dark:text-text-secondary-dark hover:text-primary dark:hover:text-primary transition-colors" href="#">
                        Forgot Password?
                    </a>
</div>
</div>
</div>
<div class="absolute -top-10 -right-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-1/2 -left-20 w-48 h-48 bg-blue-500/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute bottom-0 w-full bg-surface-light/95 dark:bg-surface-dark/95 backdrop-blur-md rounded-t-3xl shadow-nav px-8 py-5 flex justify-between items-center z-10">
<button class="flex flex-col items-center text-gray-400 hover:text-primary transition-colors">
<span class="material-icons-round text-2xl">grid_view</span>
</button>
<button class="flex flex-col items-center text-gray-400 hover:text-primary transition-colors">
<span class="material-icons-round text-2xl">receipt_long</span>
</button>
<div class="relative -top-8">
<button class="w-14 h-14 bg-primary rounded-full shadow-xl shadow-primary/40 flex items-center justify-center text-white transform hover:scale-105 transition-transform">
<span class="material-icons-round text-2xl">confirmation_number</span>
</button>
</div>
<button class="flex flex-col items-center text-gray-400 hover:text-primary transition-colors">
<span class="material-icons-round text-2xl">notifications</span>
</button>
<button class="flex flex-col items-center text-primary transition-colors">
<span class="material-icons-round text-2xl">person</span>
<span class="w-1.5 h-1.5 bg-primary rounded-full mt-1"></span>
</button>
</div>
</div>

</body></html>
