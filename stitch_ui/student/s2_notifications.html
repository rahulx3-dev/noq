<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header Section -->
<header class="flex items-center justify-between px-4 pt-6 pb-2 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<button class="flex items-center justify-center size-10 rounded-full bg-slate-200/50 dark:bg-slate-800/50 text-slate-700 dark:text-slate-300">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight flex-1 text-center pr-10">Notifications</h1>
</header>
<!-- Main Content Area (Empty State) -->
<main class="flex-1 flex flex-col items-center justify-center px-8 pb-20">
<div class="relative mb-8">
<div class="absolute inset-0 bg-primary/10 dark:bg-primary/5 rounded-full blur-3xl scale-150"></div>
<div class="relative flex items-center justify-center size-48 rounded-full bg-white dark:bg-slate-900 shadow-sm border border-slate-100 dark:border-slate-800">
<span class="material-symbols-outlined text-primary/40 dark:text-primary/30 !text-7xl">notifications_off</span>
</div>
</div>
<div class="text-center max-w-xs space-y-3">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white">No notifications yet</h2>
<p class="text-slate-500 dark:text-slate-400 leading-relaxed">
                You're all caught up! New notifications about your meal orders and credits will appear here.
            </p>
</div>
<button class="mt-10 px-8 py-3 bg-primary text-white font-semibold rounded-xl shadow-lg shadow-primary/20 flex items-center gap-2 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-sm">refresh</span>
            Refresh
        </button>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md px-2 pb-6 pt-2">
<div class="flex justify-around items-end max-w-lg mx-auto">
<a class="flex flex-col items-center gap-1 min-w-[64px] text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">grid_view</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Dashboard</span>
</a>
<a class="flex flex-col items-center gap-1 min-w-[64px] text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Orders</span>
</a>
<a class="flex flex-col items-center gap-1 min-w-[64px] text-primary" href="#">
<div class="relative">
<span class="material-symbols-outlined">confirmation_number</span>
<span class="absolute -top-1 -right-1 size-2 bg-primary rounded-full border-2 border-white dark:border-slate-900"></span>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider">Token</span>
</a>
<a class="flex flex-col items-center gap-1 min-w-[64px] text-slate-400 dark:text-slate-500 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Profile</span>
</a>
</div>
</nav>
<!-- Visual Polish Elements -->
<div class="fixed top-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-orange-400 to-primary/50 opacity-20"></div>
</body></html>
